name: Daily Lunch Notification

on:
  schedule:
    # 평일 오전 9시 10분 (KST = UTC+9) 목표
    # GitHub Actions 스케줄링 지연(~30분)을 고려하여 8시 40분에 예약
    # UTC 기준 23시 50분 (전날) = KST 8시 50분
    # 실제 실행 시간: ~9시 10분 KST (git action의 cron은 최대 1시간 지연 가능)
    - cron: '50 23 * * 0-4'
  workflow_dispatch:  # 수동 실행 가능
  repository_dispatch:  # Mattermost 등 외부 트리거용
    types: [mm-daily]

jobs:
  send-daily-lunch:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout repository
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Validate Webhook URLs
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        if [ -z "$MATTERMOST_WEBHOOK_URL" ] && [ -z "$DISCORD_WEBHOOK_URL" ]; then
          echo "❌ 오류: MATTERMOST_WEBHOOK_URL 또는 DISCORD_WEBHOOK_URL 중 최소 하나는 설정되어야 합니다."
          echo ""
          echo "다음 단계를 수행하세요:"
          echo "1. GitHub Repository Settings로 이동"
          echo "2. Secrets and variables > Actions 선택"
          echo "3. 'New repository secret' 클릭"
          echo "4. Name: MATTERMOST_WEBHOOK_URL 또는 DISCORD_WEBHOOK_URL"
          echo "5. Value: Webhook URL 입력"
          echo "6. 'Add secret' 클릭"
          echo ""
          echo "자세한 내용은 README.md 파일을 참조하세요."
          exit 1
        else
          if [ -n "$MATTERMOST_WEBHOOK_URL" ]; then
            echo "✅ MATTERMOST_WEBHOOK_URL이 설정되어 있습니다."
          fi
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            echo "✅ DISCORD_WEBHOOK_URL이 설정되어 있습니다."
          fi
        fi
    
    - name: Send daily lunch notification
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # repository_dispatch(client_payload.date)로 날짜를 받으면 해당 날짜, 없으면 오늘
        REQUESTED_DATE: ${{ github.event.client_payload.date }}
      run: |
        cd src
        if [ -n "$REQUESTED_DATE" ]; then
          echo "📅 요청된 날짜로 전송: $REQUESTED_DATE"
          python main.py daily --date "$REQUESTED_DATE" --db ../db
        else
          python main.py daily --db ../db
        fi
